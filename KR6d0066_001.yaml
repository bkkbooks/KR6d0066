法二初頌能說以二頌感致諸五身根三初總標復二別明二初瑩淨得二應現三初生死報應其二三界形色及三四聖體用若三重頌三初頌瑩淨爾二頌應現四初頌總相又二頌生死報應三三頌三界形色諸四頌四聖體用諸三頌結前雖六意根四初總標復二別明三初深達以二圓說解三知機三三結顯雖四重頌三初頌總標是二頌別明三初頌深達乃二頌圓說次三頌知機是三頌結顯十三精持廣利二初略敘標舉常二依文正釋五初牒前持毀爾二精持遠因六初所師之佛得二發迹之時最三釋名彰行四初平等行得二無相行而三無我行四四雙結名行以四聞持是五利導於六積德命三顯示今緣二初不輕得二衆會得四結顯勸持得五以偈重宣三初頌精持遠因爾二頌顯示今緣彼三頌結顯勸持我三流通分二初敘義分科自二依科別釋八初發起流通二初敘義正二釋文四初菩薩伸請爾二神力嘉讚二初神力顯勝六初現舌放光爾二現聲震動一三假彼通力其四諸天歸依即五合異達礙所六結顯經德爾二嘉讚祕妙以三正發流通是四以偈重宣三初頌神力顯勝爾二頌嘉讚祕妙能三頌正發流通能二付授流通二初標敘以二釋文六初世尊囑纍爾二示流通行所三結勸成行汝四時衆稟命時五遣化留塔爾六衆得法喜說三苦行流通二初標敘藥二釋文十二初宿王發問爾二佛示待因三初所師之佛爾二因經得道是三苦行遵奉三初神力供養得二然身供養作三後身供養四初生處一二再觀白三供養涅槃爾四供養舍利爾三結指今緣佛四勸希法行宿五廣令尊奉若六廣顯勝德十初深大宿二最上又三照明又四除暗又五最尊又六統攝又七作怗又八乘勝又九增進一十圖顯如七廣顯勝功三初總標宿二喻明如三合顯此八廣顯勝益五初書持益若二供養益若三聞品益宿四勤修益若五隨喜益若九結顯流布是十令敬持人宿十一聞品成行說十二多寶結讚多四妙行流通五圓行流通六弘護流通七轉邪流通八常行流通第七卷四妙行流通二初標敘科名妙二釋其文義九初釋尊光召爾二妙音玄應七初經家敘德爾二妙音發迹二初白彼佛釋二現此瑞於三文殊問端爾四釋尊垂答爾五文殊願見文六多寶為現爾七妙音來覲于三華德問因爾四釋尊答示五初敘往因佛二頌今迹華三明德本華四明應化二初總舉華二別明二初略敘妙二隨釋二初應六凡衆八初應諸天衆或二應王臣士庶或三應入道四衆或四應主婦童女或五應八部類或六應三惡趣諸七應宮禁等乃八牒前廣顯華二應四聖衆若五總結答華五請問三昧爾六佛答所問佛七大根同證說八妙音還歸爾九聞品成行說五圓行流通二初略敘科儀單二依科正解十初無盡發問爾二佛答名緣二初答總相佛二答別相三初脫外業五初脫三災若二脫刑戮若三脫鬼害若四脫囚繫設五脫怨賊若二脫內業三初淫若二恚若三癡若三示福應若三問現形說法無四佛答所現二初且略敘即二正科釋三初現四聖佛二現六凡三二現天應二現人三初王臣士庶應二入道四衆應三主婦童真應三現神應三結顯現無五勸興供養是六無盡興供無七總結前文無八以偈重頌二初無盡重問爾二世尊偈答二初總敘具二別答八初頌脫外業五初頌三災假二頌怨賊或三頌刑戮或四頌囚繫或五頌鬼害或二頌脫內業衆三頌現形說法具四結顯觀智真五重歎觀智無六總歎說法悲七頌名勸念妙八頌德勸歸觀九時地讚顯爾十聞品成行佛六弘護流通二初且略敘科前二依文正釋七初藥王問福爾二藥王說呪爾三勇施說呪爾四毗沙天說呪爾五持國天說呪爾六十神說呪爾七聞品成行說七轉邪流通二初且略敘科妙二依文正釋四初敘本事草五初化道之佛爾二父子之名彼三二子之德是四宿王說經爾五二子勸母時六母遣化父母七二子設悔淨八淨德再勉母九二子現變於十父發淨信時十一子喜報母於十二子請出家我十三母即聽許母十四勸親覲佛於十五敘合宮德彼十六合宮從化二十七佛為說法爾十八捨愛回心爾十九佛力示現於二十邪心頓絶爾草一佛與授記時草二捨國得道其草三感善知識即草四宿王印證爾草五妙嚴讚謝妙二示今緣佛三讚二子德是四聞品成行佛八常行流通二初略敘科名窮二依科略釋四初普賢勸發八初來儀軌範爾二請問顯法白三示普賢行佛四發行流通爾五說呪護持世六自述願力世七勸正憶念若八總結流通世二世尊助揚四初嘉讚普賢爾二助揚正福四初冥證妙利普二自具妙樂如三當成妙果普四得清淨生普三明讚毀業若四結勸崇尚是三聞品成行說四總結法會佛
