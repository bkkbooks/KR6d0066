body:
  text: 法華經弘傳序科文將釋此序科文分二初題目二初所述序題妙二能述之人終二本文二初指法華為諸佛之本意妙二明法華為釋迦之本懷二初翻譯源流三初兩土流通蘊二三時翻譯西三總結二初三經獨尚秦本三二枝派以該餘文自二正明經旨二初能說之主二初能化必須大聖夫二所化必藉昔緣適二所說之法二初泛指始末以該五時之教二初諸教逗機淺深所二未究法華之源豈二正明法華以為一乘之宗四初所說之教二初所被之機二初非機無分以彰勝是二劣機獲益以顯勝五二能被之教三初教起因緣所二三周被機出三悟修兼備繫三結讚詞二能說之心自三明弘傳二初對餘經以明弘傳自二對群機以明弘傳將四製序仰願流通輒法華經弘傳序科文終妙法蓮華經解科文第一卷將釋大經科文分三初所述經題妙二能述疏人溫三開題正釋五初通釋經題寬二通述己意飲三通敘科判釋四譯經人時姚五正解文義三初序分四初說經時處如二法會聽衆二初標敘科義二二依科列衆三初聲聞衆二初無學衆與二有學衆復二菩薩衆菩三人天衆二初天龍八部六初諸天衆爾二諸龍衆有三緊那羅衆有四乾闥婆衆有五阿修羅衆有六迦樓羅衆有二人王等衆韋三大覺圓發六初說法瑞爾二入定瑞佛三雨華瑞是四動地瑞普五衆喜瑞爾六放光瑞三初光相周亘爾二圓現法界事相下三圓現生佛始終并四大士助發二初彌勒示問二初示疑發問爾二以偈重宣二初申疑問二初總問六瑞所現於二詳問光中所現二初問圓現法界事相眉二問圓現生佛始終我二請答疑佛二文殊決疑四初忖答爾二引證二初引燈明本始諸二引瑞事同今四初六瑞同是二示疑同彌三說證同時四廣引同五初三昧同六二唱滅同日三授記同時四助化傳續同佛五顯益同八三結證所忖彌四以偈重頌三初頌引證二頌燈明明本始爾二頌瑞事同今五初頌六瑞同時二頌光相同二初頌圓現法界事相此二頌圓現生佛始終或三頌疑問同爾四頌說證同天五頌廣引同五初頌三昧同說二頌唱滅同佛三頌授記同聖四頌傳化相續同是五頌顯益同時二頌結證所忖彼三頌總牒決疑今二正宗分三流通分二正宗分二初分科敘義二二依科解文二初三周開示三初說三周授三根記三初法說一周被上根二初科分敘義妙二科釋正文三初出定歎德二初出定爾二稱歎三初歎諸佛二智告二歎自行二智舍三歎二智德用五初歎實智證法舍二歎權智說法舍三重顯深妙止四陳諸法實相所五以偈重頌六初頌歎智德用爾二頌歎法實相如三頌廣歎智假四頌廣歎法又五頌正顯今實舍六斥權使悟告二衆疑請問六初聲聞疑念爾二身子發問爾三佛止不說爾四身子再請舍五世尊再止佛六身子三請爾三正說妙法四初佛許說爾二上慢退席說三衆淨誡聽爾四正為開示二初全提舍二欵啓十四初令篤信舍二明權顯實二初標舍二釋所三示出世本懷所四示無他道佛五十方道同舍六三世道同舍七自行道同舍八結顯一乘舍九原始要終舍十斥名會實舍十一揀邪勸信又十二示作遠因除十三結勸舍十四以偈重宣三初頌退席爾二頌誡聽此三頌正說二初頌全提諸二頌欵啓十四初頌明權無二頌顯實有三頌出世本懷諸四敘實通妨佛五敘權通妨若六會權歸實我七頌三世道同三初頌過去道同二初諸佛等同過二菩薩等同三初頌菩薩行若二頌聲聞行諸三頌人天行四初造塔善行諸二造像善行若三供佛善行若四散亂善行若二頌未來道同未三頌現在道同天八頌自行道同今九頌原始開權舍十頌要終顯實舍十一廣讚一乘諸十二慰喻勸信汝十三流通說法汝十四總結說法舍二喻說一周被中根三因緣一周被下根二授廣記圓該前記三會諸佛圓證前法二顯妙勸持第二卷二喻說一周被中根二初標敘科義譬二依科解文二初法說諸餘四初身子領悟四初悟喜爾二悔責世三自慶世四重頌四初頌悟喜爾二頌悔責我三頌自慶今四別自釋疑二初徵疑自釋初二引證釋疑佛二如來述成爾三上根得記二初與記舍二重頌爾四天人讚喜四初踊喜爾二供佛各三稱讚而四重頌三初頌稱讚爾二頌喜意我三結讚回向佛二喻說正文四初正說喻文四初發起喻說四初身子自慶爾二為機起疑是三請佛決疑善四佛與開喻爾二正引火宅十初宅主財力舍二家廣人衆其三宅幣火逼堂四長者悲救長五諸子癡迷父六長者方便爾七諸子出宅爾八長者賜車舍九核審誕信舍十結答不妄世三以法合顯十初合宅主財力舍二合家廣人衆而三合宅弊火逼見四合長者悲救舍五合諸子癡迷所六合長者方便舍七合諸子出宅三初合聲聞乘舍二合緣覺乘若三合菩薩乘若八合長者賜車二初牒合二合如九合核審誕信舍十合結答不妄如四重以偈頌五初頌引喻十初頌喻本爾二頌宅幣人衆其三頌怖畏相四初喻三毒相鴟二喻四倒相屎三喻六識相由四結成諸相其四頌怖回難五初頌罔昧難處二無明三毒難由三頌無常難鳩四頌三惡難復五結成難相夜五頌火逼輪轉五初火宅壞滅是二業識不亡惡三生死相續誤四輪回根本又五總結前譬其六頌長者悲救是七頌諸子癡迷諸八頌長者方便是九頌諸子出宅諸十頌長者賜車長二頌法合十初頌合譬本告二合宅幣人衆一三合怖畏相衆四合怖畏難常五合火逼輪轉如六合長者悲救如七合諸子癡迷雖八合長者方便以九合諸子出宅是十合長者賜車汝三頌牒明三初牒喻警衆告二牒明權實我三牒明四諦若四頌結告我五擇擇宣傳三初大機在二信機若三非機三初非權人又二非機業若三非機報二初總標汝二別釋四初地獄報其二畜生報從三人間報若四通結三初非機告二正機若三結正機告二中根領悟三如來述成四中根得記二中根領悟二初分敘科義信二依文釋義五初聞法喜踊爾二敘信解情二初敘昔失即二慶今得我三說喻自慶二初喻昔失四初喻迷淪世二喻樂小世三喻怯頓遙四喻滯權爾二喻今得復四通合前喻二初合昔失三初合喻本世二合迷淪樂小世三合怯頓滯權今二合今得令五重頌前義五初頌聞法喜踊爾二頌敘信解情佛三頌說喻二初頌喻昔失四初頌喻迷淪譬二頌喻樂小爾三頌喻怯頓爾四頌喻滯權長二頌前今得父四頌通合二初頌合昔失二初頌合樂小佛二頌合滯權佛二頌合今得我五念報佛恩三初念報不能世二感慈悲恩諸三感方便恩諸第三卷三如來述成二初科分敘義此二依文正釋六初述成前義爾二示所未及二初標不盡如二釋所以二初示一音密闡迦二示真知冥化如三喻明所示四初立譬之本迦二喻一音密闡密三喻真知冥化卉四喻作成不同雖四以法合喻四初合譬之本迦二合一音密闡於三合真知冥化如四合作成不同是五結歎迦葉如六以偈重伸七初頌述成前義爾二頌示所未及如三頌喻明四初頌譬之本迦二頌喻密闡慧三頌喻冥化山四頌喻不同其四頌法合四初頌合喻本佛二頌合密闡既三頌合冥化我四頌合不同一五明隨機增進我六明諸佛道同迦七結前開後今四中根得記二初略敘科義大二正依釋文三初迦葉得記爾二三聖請記爾三三聖得記三初善吉得記爾二旃延得記爾三目連得記爾三因緣一周被下根二初略敘科義化二依科釋文二初正說因緣六初標本始佛二敘昔因十二初大通成道佛二王子隨佛其三王子讚佛三初讚滿願成道大二讚定慧功圓世三慶己值遇今四請轉法輪爾五瑞動諸天沸六諸天請法五初東方五百梵王四初佛光感動爾二尋光詣佛爾三禮佛獻供即四請轉法輪爾二東南方五百梵王四初佛光感動又二尋光詣佛爾三禮佛獻供時四請轉法輪爾三南方五百梵王四初佛光感動又二尋光詣佛爾三禮佛獻供時四請轉法輪爾四例餘方梵天西五且約上方五百四初佛光感動爾二尋光詣佛爾三禮佛獻供時四請轉法輪爾七受請開漸爾八因小請大此九受請說頓爾十聞根不等說十一沙彌演妙是十二大通印證大三示今緣五初徵昔會今佛二歷陳名迹諸三成就所化諸四廣無遺餘我五結會終實諸四喻明權實六初立譬之本比二正引喻譬三善知方宜有四衆心懈退所五說化權濟導六廢權立實爾五合顯權實五初合引喻諸二合知方宜知三合衆懈退若四合權濟佛五合廢權立實若六以偈重宣五初頌昔因八初頌大通成道爾二頌王子隨佛彼三頌王子讚佛頭四頌諸天請法束五頌受請開漸無六頌因小請大時七頌受請說頓佛八頌沙彌演妙彼二頌今緣四初頌徵昔會今彼二頌歷陳名迹是三頌成就所化爾四頌結會終實以三頌喻權實五初頌譬之本譬二頌善知方宜時三頌衆心懈退衆四頌設化權濟導五頌廢權立實諸四頌合顯權實四初頌合譬本我二頌合知方見三頌合權濟故四頌合廢權立實既五頌總結諸二領悟得記第四卷二下根領悟得記二初無學領悟得記二初略敘標科三二依文正解五初滿慈領悟爾二如來述成爾三滿慈得記二初正記過二重頌三初頌述成二初述權應爾二述護法今二頌正記其三頌結前富四千二百得記四初請記爾二通許佛三別授二初記陳如於二記五百其四重頌三初頌記陳如爾二頌記五百法三頌通記餘衆迦五五百自慶四初陳情爾二設喻二初喻昔因世二喻今緣於三合顯二初合昔因佛二合今緣今四重頌四初頌陳情我二頌設喻二初頌喻昔因譬二頌喻今緣與三頌合顯二初頌合昔因我二頌合今緣今四頌總慶我二有學衆得記二初略敘科名此二依科釋文二初請佛授記二初二師請記爾二學衆請記爾二大衆獲記七初阿難得記爾二初心決疑爾三佛為決疑爾四訶難獲益阿五羅云得記爾六二千得記爾七學衆讚謝爾二授廣記圓該前記二初分科略敘能二依科釋文二初廣記推尊五初授廣記二初現前廣記爾二後世廣記佛二推尊其人若三誡勿輕毀藥四勉人信向藥五重偈頌二初頌教師承人法爾二頌推尊其人若三頌誡勿輕毀若四頌勉信向於五結告顯勝藥二顯勝勸持十一初深妙難解爾二非機勿授藥三能持為勝藥四在處應敬藥五為道要津藥六設譬津要藥七合顯所譬菩八辨明非機藥九具體乃說藥十佛化護助藥十一以偈重宣六初頌顯勝勸持爾二頌譬津要如三頌合顯藥四頌具體乃說若五頌佛化護助我六頌結勸師承若三會諸佛圓證前法二初標科敘義自二依科釋文草三初寶塔踊現爾二諸天供塔三三印讚釋迦爾四四衆喜怪爾五樂說問緣爾六釋迦明告爾七願見多寶是八當集分身佛九願見分身大十釋迦光召爾十一因召將至爾十二初變淨土時十三東方來集是十四再變淨土時十五復變淨土釋十六分身畢集爾十七問訊咨請是十八開塔見佛爾十九衆喜修華爾二十多寶分座爾草一衆獲親近爾草二釋迦宣傳以草三以偈重頌八初頌多寶作證爾二頌多寶本願彼三頌分身來意又四頌三變淨土為五頌分身畢集諸六頌釋迦宣傳告七頌顯難勸持二初令衆諦思諸二引喻顯難六初說難若二書難假三讀難若四持難假五聽難若六奉難若八頌結勸持我二顯妙勸持二初分科略敘顯二依科釋文七初顯法妙利二初釋尊獲因二初略敘科名提二正解文義七初敘昔求法爾二仙人應求時三屈己尊道王四以偈重宣爾五結成因行佛六轉記提婆告七聞品獲益佛二龍女獲果二初略敘科名前二正解文義十七初智